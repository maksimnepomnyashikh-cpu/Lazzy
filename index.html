<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План на день</title>
    <style>
        /* Стили для всей страницы */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* Горизонтальное центрирование */
            align-items: center;     /* Вертикальное центрирование */
            min-height: 100vh;       /* Высота на весь экран */
            background-color: #f0f4f8; /* Цвет фона */
            font-family: Arial, sans-serif;
        }

        /* Стили для контейнера с надписью */
        .container {
            text-align: center;
            padding: 40px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Стили для самой надписи */
        h1 {
            font-size: 3.5rem; /* Размер шрифта */
            color: #2c3e50;    /* Темно-синий цвет текста */
            margin: 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ПЛАН НА ДЕНЬ</h1>
    </div>
</body>
</html>
